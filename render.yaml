# Render.com blueprint — deploys the full stack (backend + frontend + Postgres
# + Redis) from this repo. In the Render dashboard: New → Blueprint → point at
# this repository, then fill in the secret env vars it prompts for.
#
# NOTE: everything below uses FREE instance types so no payment card is needed.
# Free-tier trade-offs:
#   - Web services spin down after ~15 min idle; the first request after that
#     takes up to a minute to wake.
#   - The weekly scheduler only fires while the backend is awake — trigger
#     rebalances manually from the dashboard, or upgrade the backend to
#     `starter` for an always-on process.
#   - Free Postgres databases expire after 30 days unless upgraded.
#
# After the first deploy, set CORS_ORIGINS on the backend to the frontend's
# public URL, and BACKEND_INTERNAL_URL on the frontend to the backend's URL.

services:
  - type: web
    name: aegis-backend
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_SECRET_KEY
        generateValue: true
      - key: AUTH_USERNAME
        value: admin
      - key: AUTH_PASSWORD_HASH
        sync: false # paste the hash you generate locally
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: aegis-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: aegis-redis
          property: connectionString
      - key: BROKER_PROVIDER
        value: mock # switch to alpaca_paper once keys are set
      - key: MARKET_DATA_PROVIDER
        value: mock
      - key: AI_PROVIDER
        value: mock
      - key: ALPACA_PAPER_API_KEY
        sync: false
      - key: ALPACA_PAPER_API_SECRET
        sync: false
      - key: LIVE_TRADING_ENABLED
        value: "false"
      - key: CORS_ORIGINS
        sync: false # set to https://<your-frontend>.onrender.com

  - type: web
    name: aegis-frontend
    runtime: docker
    rootDir: frontend
    plan: free
    envVars:
      - key: BACKEND_INTERNAL_URL
        sync: false # set to https://<your-backend>.onrender.com

  - type: keyvalue
    name: aegis-redis
    plan: free
    ipAllowList: []

databases:
  - name: aegis-db
    plan: free
