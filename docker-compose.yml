services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: aegis
      POSTGRES_DB: aegis
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://aegis:aegis@postgres:5432/aegis
      REDIS_URL: redis://redis:6379/0
      APP_ENV: ${APP_ENV:-development}
      APP_SECRET_KEY: ${APP_SECRET_KEY:?set APP_SECRET_KEY in .env}
      AUTH_USERNAME: ${AUTH_USERNAME:-admin}
      AUTH_PASSWORD_HASH: ${AUTH_PASSWORD_HASH:-}
      BROKER_PROVIDER: ${BROKER_PROVIDER:-mock}
      MARKET_DATA_PROVIDER: ${MARKET_DATA_PROVIDER:-mock}
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      ALPACA_PAPER_API_KEY: ${ALPACA_PAPER_API_KEY:-}
      ALPACA_PAPER_API_SECRET: ${ALPACA_PAPER_API_SECRET:-}
      AI_API_KEY: ${AI_API_KEY:-}
      LIVE_TRADING_ENABLED: "false"
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres-data:
  redis-data:
